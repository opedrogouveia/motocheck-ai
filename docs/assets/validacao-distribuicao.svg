<svg viewBox="0 0 540 300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="540" height="300" fill="#ffffff"/>
  <text x="270" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#1e1b4b">Nível de risco atribuído pelo agente (5 anúncios de teste)</text>

  <!-- axis -->
  <line x1="70" y1="240" x2="500" y2="240" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="70" y1="70" x2="70" y2="240" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- y gridlines / ticks 0..3 -->
  <text x="60" y="245" text-anchor="end" font-size="12" fill="#64748b">0</text>
  <line x1="66" y1="185" x2="500" y2="185" stroke="#eef2f7" stroke-width="1"/>
  <text x="60" y="190" text-anchor="end" font-size="12" fill="#64748b">1</text>
  <line x1="66" y1="130" x2="500" y2="130" stroke="#eef2f7" stroke-width="1"/>
  <text x="60" y="135" text-anchor="end" font-size="12" fill="#64748b">2</text>
  <line x1="66" y1="75" x2="500" y2="75" stroke="#eef2f7" stroke-width="1"/>
  <text x="60" y="80" text-anchor="end" font-size="12" fill="#64748b">3</text>

  <!-- Baixo = 2 -> height 110 (top 130) -->
  <rect x="115" y="130" width="90" height="110" rx="4" fill="#16a34a"/>
  <text x="160" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">2</text>
  <text x="160" y="262" text-anchor="middle" font-size="13" fill="#334155">Baixo</text>

  <!-- Médio = 2 -> height 110 (top 130) -->
  <rect x="240" y="130" width="90" height="110" rx="4" fill="#d97706"/>
  <text x="285" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">2</text>
  <text x="285" y="262" text-anchor="middle" font-size="13" fill="#334155">Médio</text>

  <!-- Alto = 1 -> height 55 (top 185) -->
  <rect x="365" y="185" width="90" height="55" rx="4" fill="#dc2626"/>
  <text x="410" y="177" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">1</text>
  <text x="410" y="262" text-anchor="middle" font-size="13" fill="#334155">Alto</text>

  <text x="270" y="290" text-anchor="middle" font-size="11.5" fill="#64748b">Em 5/5 casos a classificação foi coerente com o conteúdo do anúncio.</text>
</svg>
