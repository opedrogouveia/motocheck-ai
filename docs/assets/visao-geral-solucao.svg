<svg viewBox="0 0 940 480" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="940" height="480" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4f46e5"/>
    </marker>
    <marker id="arrowDash" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- ================= main flow ================= -->
  <!-- A: Usuário -->
  <rect x="40" y="70" width="150" height="70" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="115" y="100" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1b4b">Usuário</text>
  <text x="115" y="120" text-anchor="middle" font-size="12" fill="#475569">comprador leigo</text>

  <!-- B: Aplicação web -->
  <rect x="250" y="70" width="180" height="70" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="340" y="100" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1b4b">Aplicação web</text>
  <text x="340" y="120" text-anchor="middle" font-size="12" fill="#475569">chat + painel de análise</text>

  <!-- C: Agente de IA -->
  <rect x="490" y="70" width="170" height="70" rx="12" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2.5"/>
  <text x="575" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#1e1b4b">Agente de IA</text>
  <text x="575" y="120" text-anchor="middle" font-size="12" fill="#475569">backend (NestJS)</text>

  <!-- D: Análise estruturada -->
  <rect x="720" y="55" width="185" height="150" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="812" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#1e1b4b">Análise estruturada</text>
  <text x="738" y="108" font-size="12.5" fill="#334155">• Nível de risco</text>
  <text x="738" y="130" font-size="12.5" fill="#334155">• Sinais de alerta</text>
  <text x="738" y="152" font-size="12.5" fill="#334155">• Recomendações</text>
  <text x="738" y="174" font-size="12.5" fill="#334155">• Perguntas ao</text>
  <text x="738" y="190" font-size="12.5" fill="#334155">&#160;&#160;vendedor</text>

  <!-- main arrows -->
  <line x1="190" y1="105" x2="248" y2="105" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="219" y="96" text-anchor="middle" font-size="11" fill="#64748b">anúncio</text>
  <line x1="430" y1="105" x2="488" y2="105" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="105" x2="718" y2="105" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- return arrow D -> A -->
  <polyline points="812,205 812,432 115,432 115,142" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="463" y="426" text-anchor="middle" font-size="11.5" fill="#64748b">resposta: risco, sinais de alerta e perguntas estratégicas</text>

  <!-- ================= knowledge cluster ================= -->
  <text x="480" y="285" text-anchor="middle" font-size="12.5" font-weight="600" fill="#6366f1">Especialização (sem fine-tuning)</text>

  <!-- F1 -->
  <rect x="240" y="300" width="150" height="64" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="315" y="328" text-anchor="middle" font-size="12.5" font-weight="600" fill="#334155">LLM</text>
  <text x="315" y="347" text-anchor="middle" font-size="11.5" fill="#64748b">Google Gemini</text>

  <!-- F2 -->
  <rect x="405" y="300" width="150" height="64" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="328" text-anchor="middle" font-size="12.5" font-weight="600" fill="#334155">Base de conhecimento</text>
  <text x="480" y="347" text-anchor="middle" font-size="11.5" fill="#64748b">catálogo · RAG</text>

  <!-- F3 -->
  <rect x="570" y="300" width="150" height="64" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="645" y="328" text-anchor="middle" font-size="12.5" font-weight="600" fill="#334155">Memória</text>
  <text x="645" y="347" text-anchor="middle" font-size="11.5" fill="#64748b">da conversa</text>

  <!-- dashed arrows feeders -> agent -->
  <line x1="330" y1="300" x2="545" y2="142" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowDash)"/>
  <line x1="480" y1="300" x2="575" y2="142" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowDash)"/>
  <line x1="630" y1="300" x2="605" y2="142" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowDash)"/>
</svg>
