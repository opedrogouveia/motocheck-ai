<svg viewBox="0 0 720 470" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="720" height="470" fill="#ffffff"/>
  <defs>
    <marker id="dep" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6366f1"/>
    </marker>
  </defs>

  <text x="360" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#1e1b4b">Arquitetura em camadas (Clean Architecture / DDD)</text>

  <!-- Layer 1: Apresentação -->
  <rect x="150" y="66" width="500" height="74" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="170" y="98" font-size="16" font-weight="700" fill="#1e1b4b">Apresentação</text>
  <text x="170" y="120" font-size="12.5" fill="#334155">Next.js (App Router): UI do chat, painel de análise e proxy seguro</text>

  <!-- Layer 2: Aplicação / Negócio -->
  <rect x="150" y="154" width="500" height="74" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="170" y="186" font-size="16" font-weight="700" fill="#1e1b4b">Aplicação / Negócio</text>
  <text x="170" y="208" font-size="12.5" fill="#334155">NestJS: casos de uso (enviar mensagem, autenticar, comparar motos...)</text>

  <!-- Layer 3: Domínio -->
  <rect x="150" y="242" width="500" height="74" rx="10" fill="#c7d2fe" stroke="#4f46e5" stroke-width="2"/>
  <text x="170" y="274" font-size="16" font-weight="700" fill="#1e1b4b">Domínio</text>
  <text x="170" y="296" font-size="12.5" fill="#334155">Entidades e interfaces de repositório · contrato ILLMProvider</text>

  <!-- Layer 4: Infraestrutura -->
  <rect x="150" y="330" width="500" height="74" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="170" y="362" font-size="16" font-weight="700" fill="#1e1b4b">Infraestrutura</text>
  <text x="170" y="384" font-size="12.5" fill="#334155">Prisma + PostgreSQL (Supabase) · Google Gemini (LLM)</text>

  <!-- dependency arrow -->
  <line x1="115" y1="72" x2="115" y2="398" stroke="#6366f1" stroke-width="2" marker-end="url(#dep)"/>
  <text x="104" y="240" text-anchor="middle" font-size="12" fill="#6366f1" font-weight="600" transform="rotate(-90 104 240)">fluxo de chamadas</text>

  <text x="360" y="438" text-anchor="middle" font-size="11.5" fill="#64748b">O domínio define os contratos (ex.: ILLMProvider) que a infraestrutura implementa — inversão de dependência.</text>
</svg>
